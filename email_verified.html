<style>
  .verified-wrap{min-height:calc(100vh - 72px - 137px);display:flex;flex-direction:column;justify-content:center;}
  .verified-actions{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:32px 0 26px;}
  .app-button{
    display:inline-flex;align-items:center;justify-content:center;
    min-height:52px;padding:14px 24px;border:1.5px solid var(--ink);border-radius:2px;
    background:var(--ink);color:var(--lime);text-decoration:none;
    font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.12em;
    transition:opacity .15s,transform .15s;
  }
  .app-button:hover{color:var(--lime);opacity:.88;transform:translateY(-1px);}
  .app-button:focus-visible{outline:2px solid var(--tangerine);outline-offset:4px;}
  .home-link{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;
    color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;
  }
  .home-link:hover{color:var(--tangerine);}
  .verified-note{max-width:680px;}
  .verified-note a{color:var(--ink);text-decoration:underline;text-underline-offset:2px;}
  @media(max-width:520px){
    .verified-wrap{justify-content:flex-start;}
    .app-button{width:100%;}
    .verified-actions{align-items:stretch;gap:14px;}
  }
  @media(prefers-reduced-motion:reduce){
    .app-button{transition:none;}
    .app-button:hover{transform:none;}
  }
</style>
</head>
